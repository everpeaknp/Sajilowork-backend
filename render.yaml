databases:
  - name: sajilowork-db
    databaseName: sajilowork
    user: sajilowork_user

  - type: redis
    name: sajilowork-redis
    plan: free
    ipAllowList: [] # internal connections only by default

services:
  - type: web
    name: sajilowork-backend
    env: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: free
    healthCheckPath: /api/schema/redoc/ # Or any other public health endpoint
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sajilowork-db
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: sajilowork-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromDatabase:
          name: sajilowork-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromDatabase:
          name: sajilowork-redis
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      # Cloudinary — set in Render Dashboard (Environment) for production uploads
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_UPLOAD_PRESET
        sync: false
      - key: CLOUDINARY_DEFAULT_FOLDER
        value: Sajilowork
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REDIRECT_URI
        sync: false
      # Render Dashboard → Environment (required for Google sign-in on production):
      #   GOOGLE_CLIENT_ID=<new Web client ID from Google Cloud Console>
      #   GOOGLE_CLIENT_SECRET=<matching client secret>
      #   GOOGLE_OAUTH_REDIRECT_URI=https://sajiloworkbackend.everacy.com/api/v1/auth/google/callback/
      #   BACKEND_URL=https://sajiloworkbackend.everacy.com
      #   FRONTEND_URL=https://www.sajilowork.com
      # Google Console → Authorized JavaScript origins: https://www.sajilowork.com
      # Add the same redirect URI under Google Console → Credentials → Authorized redirect URIs.
