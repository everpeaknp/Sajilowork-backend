    RulePolicy:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        category:
          enum:
          - ESCROW
          - OFFER
          - ASSIGNMENT
          - REVIEW
          - CANCELLATION
          - DISPUTE
          - WALLET
          - TRUST
          - VERIFICATION
          - FRAUD
          - MESSAGING
          - AUTO_RELEASE
          - REFUND
          - PROMOTION
          - TASK_EXPIRY
          - PAYMENT_BYPASS
          - WITHDRAWAL
          - NOTIFICATION
          - MODERATION
          type: string
          description: |-
            * `ESCROW` - Escrow
            * `OFFER` - Offer / bidding
            * `ASSIGNMENT` - Task assignment
            * `REVIEW` - Reviews
            * `CANCELLATION` - Cancellation
            * `DISPUTE` - Dispute
            * `WALLET` - Wallet
            * `TRUST` - Trust & ranking
            * `VERIFICATION` - Verification
            * `FRAUD` - Fraud prevention
            * `MESSAGING` - Messaging
            * `AUTO_RELEASE` - Auto-release
            * `REFUND` - Refund
            * `PROMOTION` - Promotion
            * `TASK_EXPIRY` - Task expiry
            * `PAYMENT_BYPASS` - Payment bypass prevention
            * `WITHDRAWAL` - Withdrawal
            * `NOTIFICATION` - Notification
            * `MODERATION` - Account moderation
          x-spec-enum-id: cd82162c67e36d31
          readOnly: true
        slug:
          type: string
          readOnly: true
          description: Unique key within category, e.g. require_escrow_before_start
          pattern: ^[-a-zA-Z0-9_]+$
        name:
          type: string
          readOnly: true
        description:
          type: string
          readOnly: true
        is_active:
          type: boolean
          readOnly: true
        priority:
          type: integer
          readOnly: true
          description: Higher runs first; first blocking violation stops evaluation
            when stop_on_block=True globally.
        enforcement:
          enum:
          - BLOCK
          - WARN
          - AUTO
          - NOTIFY
          type: string
          description: |-
            * `BLOCK` - Block action
            * `WARN` - Warn only
            * `AUTO` - Automatic side effect
            * `NOTIFY` - Send notification
          x-spec-enum-id: 3fd9dac999373b4e
          readOnly: true
        event_triggers:
          readOnly: true
          description: List of RuleEvent values, e.g. ["task.cancelled", "bid.created"].
            Empty = category default.
        conditions:
          readOnly: true
          description: 'Optional filters: roles, statuses, min_amount, verified_only,
            etc.'
        parameters:
          readOnly: true
          description: Category-specific thresholds and toggles.
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - category
      - conditions
      - description
      - enforcement
      - event_triggers
      - id
      - is_active
      - name
      - parameters
      - priority
      - slug
      - updated_at
