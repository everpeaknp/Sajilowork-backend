  /api/v1/analytics/events/:
    get:
      operationId: analytics_events_list
      description: ViewSet for Event tracking and retrieval.
      parameters:
      - in: query
        name: category
        schema:
          type: string
          x-spec-enum-id: b6e6be71ca25f97c
          enum:
          - bid
          - chat
          - notification
          - payment
          - review
          - search
          - system
          - task
          - user
        description: |-
          * `user` - User
          * `task` - Task
          * `bid` - Bid
          * `payment` - Payment
          * `chat` - Chat
          * `review` - Review
          * `search` - Search
          * `notification` - Notification
          * `system` - System
      - in: query
        name: event_type
        schema:
          type: string
          x-spec-enum-id: 87f7c75d8bf12b9a
          enum:
          - api_called
          - bid_accepted
          - bid_rejected
          - bid_submitted
          - bid_withdrawn
          - conversation_started
          - error_occurred
          - filter_applied
          - message_sent
          - notification_read
          - notification_sent
          - payment_completed
          - payment_failed
          - payment_initiated
          - payout_completed
          - profile_updated
          - profile_viewed
          - refund_requested
          - review_responded
          - review_submitted
          - search_performed
          - task_bookmarked
          - task_cancelled
          - task_completed
          - task_created
          - task_published
          - task_viewed
          - user_login
          - user_logout
          - user_registered
        description: |-
          * `user_registered` - User Registered
          * `user_login` - User Login
          * `user_logout` - User Logout
          * `profile_updated` - Profile Updated
          * `profile_viewed` - Profile Viewed
          * `task_created` - Task Created
          * `task_published` - Task Published
          * `task_viewed` - Task Viewed
          * `task_bookmarked` - Task Bookmarked
          * `task_completed` - Task Completed
          * `task_cancelled` - Task Cancelled
          * `bid_submitted` - Bid Submitted
          * `bid_accepted` - Bid Accepted
          * `bid_rejected` - Bid Rejected
          * `bid_withdrawn` - Bid Withdrawn
          * `payment_initiated` - Payment Initiated
          * `payment_completed` - Payment Completed
          * `payment_failed` - Payment Failed
          * `refund_requested` - Refund Requested
          * `payout_completed` - Payout Completed
          * `message_sent` - Message Sent
          * `conversation_started` - Conversation Started
          * `review_submitted` - Review Submitted
          * `review_responded` - Review Responded
          * `search_performed` - Search Performed
          * `filter_applied` - Filter Applied
          * `notification_sent` - Notification Sent
          * `notification_read` - Notification Read
          * `error_occurred` - Error Occurred
          * `api_called` - API Called
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: user
        schema:
          type: string
          format: uuid
      tags:
